name: build-boot
on:
  workflow_dispatch:

jobs:
  build-boot:
    runs-on: ubuntu-latest
    container:
      image: jackadam/pmos_build:260715
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            patches
            scripts
            config

      - name: Build kernel + initramfs + boot.img
        run: |
          set -eu
          mkdir -p /build/out /build/kernel /src

          # Clone kernel source
          git clone --depth=1 -b v6.6-msm8916 \
            https://github.com/msm8916-mainline/linux.git /build/kernel

          # Apply kernel patches
          if ls patches/linux-msm8916-*.patch 2>/dev/null; then
            for p in patches/linux-msm8916-*.patch; do
              echo "Applying $p"
              git -C /build/kernel am -q "$p" 2>/dev/null || true
            done
          fi

          # Build kernel
          make -C /build/kernel ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          make -C /build/kernel -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- Image.gz dtbs

          # Build initramfs
          mkdir -p /build/initramfs
          cat > /build/initramfs/init << 'INITEOF'
          #!/bin/busybox sh
          mount -t proc none /proc
          mount -t sysfs none /sys
          echo "pmOS booting from initramfs..."
          exec /sbin/init
          INITEOF
          chmod +x /build/initramfs/init
          cd /build/initramfs
          find . | cpio -H newc -o | gzip > /build/out/initramfs.gz

          # Create boot.img
          KERNEL=/build/kernel/arch/arm64/boot/Image.gz
          DTB=/build/kernel/arch/arm64/boot/dts/qcom/msm8916-thwc-ufi001c.dtb
          RAMDISK=/build/out/initramfs.gz

          # Append DTB to kernel
          cat "$KERNEL" "$DTB" > /build/out/kernel-dtb.gz

          # mkbootimg (from AOSP, usually in PATH on pmos_build image)
          mkbootimg \
            --kernel /build/out/kernel-dtb.gz \
            --ramdisk "$RAMDISK" \
            --base 0x80000000 \
            --kernel_offset 0x01000000 \
            --ramdisk_offset 0x03000000 \
            --dtb_offset 0x05000000 \
            --tags_offset 0x00000100 \
            --pagesize 2048 \
            --cmdline "console=ttyMSM0,115200n8 root=/dev/disk/by-partlabel/userdata rw rootwait" \
            -o /build/out/build_boot.img

          ls -lh /build/out/

      - uses: actions/upload-artifact@v4
        with:
          name: build_boot.img
          path: /build/out/build_boot.img
          retention-days: 90
