name: build-rootfs
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-rootfs.yml'
      - 'config/pmbootstrap-build.cfg'
  workflow_dispatch:

jobs:
  build-rootfs:
    runs-on: ubuntu-latest
    container:
      image: jackadam/pmos_build:260715
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            config
            scripts

      - name: Update pmbootstrap to latest
        run: |
          rm -rf /opt/pmbootstrap
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git /opt/pmbootstrap
          ln -sf /opt/pmbootstrap/pmbootstrap.py /usr/local/bin/pmbootstrap
          pmbootstrap --version

      - name: Build rootfs with pmbootstrap
        run: |
          set -eu

          apt-get update -qq
          apt-get install -y -qq kpartx procps

          WORK="$HOME/.local/var/pmbootstrap"
          CFG="$HOME/.config/pmbootstrap_v3.cfg"
          DEVICE="generic-zhihe"

          echo "HOME=$HOME"
          echo "WORK=$WORK"
          echo "CFG=$CFG"

          # Create work directory and clone pmaports from mainlining fork
          mkdir -p "$WORK/cache_git"
          git clone --depth=1 https://github.com/mainlining/pmaports.git \
            "$WORK/cache_git/pmaports"

          # Create pmbootstrap_v3.cfg with ALL settings (work, device, kernel, user)
          # Using printf to avoid heredoc YAML parse issues
          mkdir -p "$HOME/.config"
          printf '%s\n' \
            '[pmbootstrap]' \
            "work = $WORK" \
            "device = $DEVICE" \
            'kernel = ufi001c' \
            'ui = console' \
            'user = pmos' \
            'extra_space = 0' \
            '' \
            '[providers]' \
            '' \
            '[mirrors]' \
            > "$CFG"

          cat "$CFG"

          # Install rootfs (no FDE, zap previous, password for automation)
          pmbootstrap --as-root install --password pmos --no-fde --zap

          # Export images to /build/out/
          mkdir -p /build/out
          pmbootstrap --as-root export /build/out/

          echo "=== Contents of /build/out/ ==="
          ls -lh /build/out/ 2>/dev/null || echo "Export dir empty, searching work dir..."

          # Fallback: search work dir for img/boot files
          find "$WORK" -type f \( -name "*.img" -o -name "boot.img" \) \
            -not -path "*/cache*" 2>/dev/null | head -20

          # Copy any found images
          for f in $(find "$WORK" -type f \( -name "*.img" -o -name "boot.img" \) \
            -not -path "*/cache*" 2>/dev/null); do
            cp "$f" /build/out/ 2>/dev/null || true
          done

          ls -lh /build/out/

      - uses: actions/upload-artifact@v4
        with:
          name: pmos-images
          path: /build/out/
          retention-days: 90
