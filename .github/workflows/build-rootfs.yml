name: build-rootfs
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-rootfs.yml'
      - 'config/pmbootstrap-build.cfg'
  workflow_dispatch:

jobs:
  build-rootfs:
    runs-on: ubuntu-latest
    container:
      image: jackadam/pmos_build:260715
      options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            config
            scripts

      - name: Update pmbootstrap to latest
        run: |
          rm -rf /opt/pmbootstrap
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git /opt/pmbootstrap
          ln -sf /opt/pmbootstrap/pmbootstrap.py /usr/local/bin/pmbootstrap
          pmbootstrap --version

      - name: Build rootfs with pmbootstrap
        run: |
          set -eu

          apt-get update -qq
          apt-get install -y -qq kpartx procps kmod

          WORK="$HOME/.local/var/pmbootstrap"
          CFG="$HOME/.config/pmbootstrap_v3.cfg"
          DEVICE="generic-zhihe"

          echo "HOME=$HOME"
          echo "WORK=$WORK"
          echo "CFG=$CFG"

          # Create work directory with version marker
          mkdir -p "$WORK/cache_git"
          printf '8\n' > "$WORK/version"
          git clone --depth=1 https://github.com/mainlining/pmaports.git \
            "$WORK/cache_git/pmaports"
          # pmbootstrap expects origin to point to the upstream GitLab URL
          # and that a remote-tracking branch origin/main exists with
          # channels.cfg (read via 'git show origin/main:channels.cfg').
          # Replace the URL and synthesize the ref locally.
          git -C "$WORK/cache_git/pmaports" remote set-url origin \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git
          # pmbootstrap reads channels.cfg via 'git show origin/main:channels.cfg'.
          # Synthesize the origin/main remote-tracking ref from current HEAD.
          git -C "$WORK/cache_git/pmaports" update-ref refs/remotes/origin/main \
            "$(git -C "$WORK/cache_git/pmaports" rev-parse HEAD)"
          echo "=== pmaports git refs ==="
          git -C "$WORK/cache_git/pmaports" show-ref | head -5

          # Create pmbootstrap_v3.cfg with ALL settings (work, device, kernel, user)
          # Using printf to avoid heredoc YAML parse issues
          mkdir -p "$HOME/.config"
          printf '%s\n' \
            '[pmbootstrap]' \
            "work = $WORK" \
            "device = $DEVICE" \
            'kernel = ufi001c' \
            'ui = console' \
            'user = pmos' \
            'extra_space = 0' \
            '' \
            '[mirrors]' \
            'alpine = https://dl-cdn.alpinelinux.org/alpine/' \
            'pmaports = https://mirror.postmarketos.org/postmarketos/' \
            > "$CFG"

          cat "$CFG"

          # Force-build kernel, firmware, mkinitfs, and boot-deploy locally.
          # These packages don't exist on the binary mirror (kernel/firmware)
          # or have newer incompatible versions (mkinitfs 2.11.1, boot-deploy
          # 0.23.0) vs what danila/courbet expects.
          # WARNING: kernel build takes ~15 min, and the binary mirror doesn't
          # serve custom device packages.
          for pkg in device-generic-zhihe-kernel-ufi001c device-generic-zhihe-nonfree-firmware \
            postmarketos-mkinitfs boot-deploy; do
            pmbootstrap --as-root build --force --arch aarch64 "$pkg" 2>&1 || echo "WARNING: force-build $pkg failed"
          done
          # Pin mkinitfs version so apk uses the local build (2.2.2-r2)
          # instead of the binary mirror's newer but incompatible version.
          sed -i 's/pmb\.chroot\.apk\.install(\["postmarketos-mkinitfs"\]/pmb.chroot.apk.install(["postmarketos-mkinitfs=2.2.2-r2"]/' \
            /opt/pmbootstrap/pmb/chroot/initfs.py
          # apk v3 propagates kmod depmod trigger failures as exit code 2
          # from apk.static and exit code 1 for --virtual .pmbootstrap installs.
          # Patch _apk_with_progress to tolerate both and route all commands
          # through it (with_progress=True for all).
          echo "=== Patching helpers/apk.py: _apk_with_progress exit code handling ==="
          python3 -c "c=open('/opt/pmbootstrap/pmb/helpers/apk.py').read();old='        pmb.helpers.run_core.check_return_code(p_apk.returncode, log_msg)';new='        if p_apk.returncode in (1, 2):\n            print(f\"WARNING: apk.static returned exit code {p_apk.returncode}, ignoring (likely depmod trigger)\")\n        else:\n            pmb.helpers.run_core.check_return_code(p_apk.returncode, log_msg)';assert old in c, 'Pattern not found in helpers/apk.py!';c=c.replace(old,new);open('/opt/pmbootstrap/pmb/helpers/apk.py','w').write(c)"
          echo "=== Patching chroot/apk.py: route all commands through with_progress ==="
          python3 -c "c=open('/opt/pmbootstrap/pmb/chroot/apk.py').read();c=c.replace('with_progress=(i == 0)','with_progress=True').replace('with_progress=False','with_progress=True');open('/opt/pmbootstrap/pmb/chroot/apk.py','w').write(c)"
          echo "=== Verify: helpers/apk.py check_return_code ==="
          grep -n 'check_return_code\|WARNING.*exit code' /opt/pmbootstrap/pmb/helpers/apk.py
          echo "=== Verify: chroot/apk.py with_progress ==="
          grep -n 'with_progress' /opt/pmbootstrap/pmb/chroot/apk.py

          # Fix: postmarketos-mkinitfs 2.2.2-r2 (local build) doesn't support
          # the !optional suffix in file lists. Patch initfs.py to strip
          # !optional from file lists before running mkinitfs in the chroot.
          echo "=== Fixing pmb/chroot/initfs.py: delete all !optional lines before mkinitfs ==="
          python3 -c "c=open('/opt/pmbootstrap/pmb/chroot/initfs.py').read();old='pmb.chroot.root([\"mkinitfs\"], chroot)';new='pmb.chroot.root([\"sh\", \"-c\", \"sed -i \'/!optional/d\' /usr/share/mkinitfs/files/*.files 2>/dev/null; mkinitfs\"], chroot)';assert old in c, 'Pattern not found!';c=c.replace(old,new);open('/opt/pmbootstrap/pmb/chroot/initfs.py','w').write(c);print('Patched')"
          grep -n 'mkinitfs' /opt/pmbootstrap/pmb/chroot/initfs.py

          # Install rootfs (no FDE, password for automation).
          set +e
          pmbootstrap --as-root install --password pmos --no-fde
          RC=$?
          set -e
          if [ $RC -ne 0 ]; then
            echo "=== pmbootstrap log.txt ==="
            cat "$HOME/.local/var/pmbootstrap/log.txt" 2>/dev/null || true
            exit $RC
          fi

          # Export images to /build/out/
          mkdir -p /build/out
          pmbootstrap --as-root export /build/out/ 2>&1

          echo "=== Contents of /build/out/ ==="
          ls -lh /build/out/ 2>/dev/null || echo "Export dir empty, searching work dir..."

          # Fallback: search work dir for img/boot files
          find "$WORK" -type f \( -name "*.img" -o -name "boot.img" \) \
            -not -path "*/cache*" 2>/dev/null | head -20

          # Copy any found images
          for f in $(find "$WORK" -type f \( -name "*.img" -o -name "boot.img" \) \
            -not -path "*/cache*" 2>/dev/null); do
            cp "$f" /build/out/ 2>/dev/null || true
          done

          ls -lh /build/out/

      - uses: actions/upload-artifact@v4
        with:
          name: pmos-images
          path: /build/out/
          retention-days: 90
