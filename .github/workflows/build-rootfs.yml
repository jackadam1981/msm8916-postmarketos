name: build-rootfs
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-rootfs.yml'
      - 'config/pmbootstrap-build.cfg'
  workflow_dispatch:

jobs:
  build-rootfs:
    runs-on: ubuntu-latest
    container:
      image: jackadam/pmos_build:260715
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            config
            scripts

      - name: Update pmbootstrap to latest
        run: |
          rm -rf /opt/pmbootstrap
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git /opt/pmbootstrap
          ln -sf /opt/pmbootstrap/pmbootstrap.py /usr/local/bin/pmbootstrap
          pmbootstrap --version

      - name: Build rootfs with pmbootstrap
        run: |
          set -eu

          apt-get update -qq
          apt-get install -y -qq kpartx procps git

          # Parse device vendor/codename from config
          DEVICE=$(grep '^device' config/pmbootstrap-build.cfg | cut -d= -f2 | tr -d ' ')
          VENDOR="${DEVICE%%-*}"
          CODENAME="${DEVICE#*-}"
          echo "Device: $DEVICE (vendor=$VENDOR codename=$CODENAME)"

          WORK=/build/pmbootstrap
          mkdir -p "$WORK/cache_git" "$WORK/chroot_native"

          # Clone pmaports
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmaports.git \
            "$WORK/cache_git/pmaports"

          # Create config file for pmbootstrap
          printf '%s\n' \
            '[pmbootstrap]' \
            "device = $DEVICE" \
            'ui = console' \
            'user = pmos' \
            "work = $WORK" \
            'extra_free_space = 0' \
            > "$WORK/config.cfg"

          # Init by creating minimal work dir and running install
          pmbootstrap --as-root --work="$WORK" install --no-fde --zap

          # Collect outputs
          mkdir -p /build/out

          BOOT_IMG="$WORK/chroot_native/home/pmos/rootfs/${DEVICE}-boot.img"
          ROOTFS_IMG="$WORK/chroot_native/home/pmos/rootfs/${DEVICE}.img"

          if [ -f "$BOOT_IMG" ]; then
            cp "$BOOT_IMG" /build/out/boot.img
            echo "boot.img: $(ls -lh /build/out/boot.img)"
          else
            echo "WARNING: boot.img not found at $BOOT_IMG"
          fi

          if [ -f "$ROOTFS_IMG" ]; then
            cp "$ROOTFS_IMG" /build/out/rootfs.img
            echo "rootfs.img: $(ls -lh /build/out/rootfs.img)"
          else
            echo "WARNING: rootfs.img not found at $ROOTFS_IMG"
          fi

          ls -lh /build/out/

      - uses: actions/upload-artifact@v4
        with:
          name: pmos-images
          path: /build/out/
          retention-days: 90
