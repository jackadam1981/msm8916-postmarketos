name: mem-boot
on:
  workflow_dispatch:
  # optional: you can also trigger on push/tag if needed

jobs:
  mem-boot:
    runs-on: ubuntu-latest
    container:
      image: jackadam/pmos_build:260715
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            patches
            scripts
            config

      - name: Build kernel + minimal initramfs + boot.img
        run: |
          set -eu
          mkdir -p /build/out /build/kernel /src

          # Clone kernel source
          git clone --depth=1 -b v6.6-msm8916 \
            https://github.com/msm8916-mainline/linux.git /build/kernel

          # Apply kernel patches (if any)
          if ls patches/linux-msm8916-*.patch 2>/dev/null; then
            for p in patches/linux-msm8916-*.patch; do
              echo "Applying $p"
              git -C /build/kernel am -q "$p" 2>/dev/null || true
            done
          fi

          # Build kernel
          make -C /build/kernel ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          make -C /build/kernel -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- Image.gz dtbs

           # ---------- Minimal initramfs for memory‑boot validation ----------
           mkdir -p /build/initramfs
           cat > /build/initramfs/init << 'INITEOF'
               #!/bin/busybox sh
               # Print marker so we can see it on UART or via adbd (if you start it)
               echo "pmOS booting from initramfs..."
               # Keep the initramfs alive for a while so the message is observable
               sleep 30
           INITEOF
           chmod +x /build/initramfs/init
          cd /build/initramfs
          find . | cpio -H newc -o | gzip > /build/out/initramfs.gz

          # Create boot.img (same as build-boot workflow)
          KERNEL=/build/kernel/arch/arm64/boot/Image.gz
          DTB=/build/kernel/arch/arm64/boot/dts/qcom/msm8916-zhihe-ufi003-mb-v02.dtb
          RAMDISK=/build/out/initramfs.gz

          # Append DTB to kernel
          cat "$KERNEL" "$DTB" > /build/out/kernel-dtb.gz

          # mkbootimg (provided in the container image)
          mkbootimg \
            --kernel /build/out/kernel-dtb.gz \
            --ramdisk "$RAMDISK" \
            --base 0x80000000 \
            --kernel_offset 0x01000000 \
            --ramdisk_offset 0x03000000 \
            --dtb_offset 0x05000000 \
            --tags_offset 0x00000100 \
            --pagesize 2048 \
            --cmdline "console=ttyMSM0,115200n8" \
            -o /build/out/mem_boot.img

          ls -lh /build/out/

      - uses: actions/upload-artifact@v4
        with:
          name: mem_boot.img
          path: /build/out/mem_boot.img
          retention-days: 90